<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarHub Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0c12;
        --panel: rgba(255, 215, 0, 0.06);
        --border: rgba(255, 215, 0, 0.18);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --good: #2ecc71;
        --bad: #ff6347;
        --warn: #f1c40f;
        --accent: #ffd700;
        --accent2: rgba(255, 215, 0, 0.12);
        --sidebarW: 320px;
      }
      * {
        box-sizing: border-box;
        font-family: Kanit, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      body {
        margin: 0;
        background: radial-gradient(900px 520px at 14% 12%, rgba(255,215,0,0.10), transparent 62%),
                    radial-gradient(720px 520px at 86% 28%, rgba(255,215,0,0.06), transparent 60%),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
      }
      .layout {
        display: flex;
        min-height: 100vh;
        animation: fadeIn 320ms ease both;
      }
      .sidebar {
        width: var(--sidebarW);
        padding: 22px 16px;
        border-right: 1px solid var(--border);
        background: rgba(0,0,0,0.20);
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        font-weight: 850;
        letter-spacing: 0.8px;
        font-size: 18px;
        margin: 6px 10px 16px;
      }
      .nav {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 0 8px;
      }
      .navBtn {
        width: 100%;
        text-align: left;
        padding: 12px 14px;
        font-size: 14px;
        border-radius: 14px;
      }
      .navBtn.active {
        background: rgba(255,215,0,0.10);
        border-color: rgba(255,215,0,0.30);
        color: rgba(255,255,255,0.94);
      }
      .content {
        flex: 1;
        min-width: 0;
      }
      header {
        padding: 28px 20px 10px;
        max-width: 1100px;
        margin: 0 auto;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.5px;
      }
      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.28);
        border-radius: 999px;
        font-size: 13px;
        color: var(--muted);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--warn);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px 20px 30px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }
      .card {
        grid-column: span 4;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 16px 14px;
        backdrop-filter: blur(8px);
      }
      .card h2 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 650;
        color: var(--muted);
        letter-spacing: 0.3px;
      }
      .value {
        font-size: 26px;
        font-weight: 750;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .value small {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
      .desc {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        min-height: 18px;
        white-space: pre-line;
        overflow-wrap: anywhere;
      }
      .tableWrap {
        grid-column: span 12;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        backdrop-filter: blur(8px);
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 12px;
        min-width: 720px;
      }
      thead th {
        text-align: left;
        font-size: 12px;
        color: var(--muted);
        padding: 12px 12px;
        border-bottom: 1px solid rgba(255,215,0,0.20);
        background: rgba(0,0,0,0.30);
      }
      tbody td {
        padding: 12px 12px;
        border-bottom: 1px solid rgba(255,215,0,0.10);
        font-size: 13px;
        color: rgba(255,255,255,0.88);
      }
      tbody tr:hover td {
        background: rgba(255,215,0,0.05);
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.2);
        color: rgba(255,255,255,0.85);
        font-size: 12px;
        font-weight: 650;
        white-space: nowrap;
      }
      .tag.good { border-color: rgba(46,204,113,0.35); }
      .tag.bad { border-color: rgba(255,99,71,0.35); }
      .tag.warn { border-color: rgba(241,196,15,0.35); }
      .tag .miniDot { width: 8px; height: 8px; border-radius: 999px; background: var(--warn); }
      .tag.good .miniDot { background: var(--good); }
      .tag.bad .miniDot { background: var(--bad); }
      .tag.warn .miniDot { background: var(--warn); }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.28);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 650;
        font-size: 13px;
        font-family: Kanit, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      button:hover { background: rgba(255,215,0,0.08); }

      a { color: var(--accent); }
      a:hover { color: rgba(255,215,0,0.85); }

      input, textarea, select {
        width: 100%;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.22);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        outline: none;
      }
      textarea { min-height: 92px; resize: vertical; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 6px; }
      .adminRow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .adminTop { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 2px 2px 10px; }
      .adminTop .pill { padding: 8px 10px; }
      .adminStatus { color: var(--muted); font-size: 12px; white-space: pre-line; overflow-wrap: anywhere; }
      .annItem {
        margin-top: 10px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,215,0,0.18);
        background: rgba(0,0,0,0.20);
      }
      .annTitleRow { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
      .annActions { display: flex; gap: 8px; flex-wrap: wrap; }
      .miniBtn { padding: 8px 10px; border-radius: 12px; font-size: 12px; }
      .danger { border-color: rgba(255,99,71,0.35); }
      .fadeIn { animation: fadeIn 220ms ease both; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .layout, .fadeIn { animation: none !important; }
      }

      @media (max-width: 880px) {
        .card { grid-column: span 12; }
        .adminRow { grid-template-columns: 1fr; }
      }
      @media (max-width: 980px) {
        .layout { flex-direction: column; }
        .sidebar {
          width: 100%;
          height: auto;
          position: static;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .nav { flex-direction: row; flex-wrap: wrap; }
        .navBtn { width: auto; }
      }
      @media (max-width: 520px) {
        header { padding: 18px 14px 8px; }
        .wrap { padding: 8px 14px 18px; }
        h1 { font-size: 22px; }
        .pill { font-size: 12px; }
        .nav { flex-direction: row; flex-wrap: nowrap; padding: 0 2px; gap: 8px; }
        .navBtn { flex: 1; width: auto; text-align: center; padding: 12px 10px; }
        table { min-width: 680px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">StarHub</div>
        <div class="nav">
          <button id="navDashboard" class="navBtn active">Dashboard</button>
          <button id="navAnnouncements" class="navBtn">ประกาศ</button>
        </div>
      </aside>

      <main class="content">
        <header>
          <h1>StarHub Status</h1>
          <div class="subtitle">
            <span class="pill"><span class="dot" id="dot"></span><span id="headline">กำลังโหลด...</span></span>
            <span class="pill">อัปเดตล่าสุด: <span id="updatedAt">-</span></span>
            <span class="actions">
              <button id="refreshBtn">รีเฟรช</button>
            </span>
          </div>
        </header>

        <div class="wrap">
          <section id="viewDashboard">
            <div class="grid">
              <div class="card">
                <h2>ผู้ใช้งาน StarHub</h2>
                <div class="value"><span id="onlineUsers">-</span><small>ออนไลน์ (โดยประมาณ)</small></div>
                <div class="desc" id="onlineDesc"></div>
              </div>

              <div class="card">
                <h2>สถานะระบบ</h2>
                <div class="value"><span id="serverStatus">-</span></div>
                <div class="desc" id="maintenanceMessage"></div>
              </div>

              <div class="card">
                <h2>API</h2>
                <div class="value"><span id="apiStatus">-</span></div>
                <div class="desc" id="apiDesc"></div>
              </div>

              <div class="tableWrap">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:2px 2px 12px;">
                  <div style="font-weight:750; letter-spacing:0.3px;">Instances</div>
                  <div style="color:var(--muted); font-size:12px;">Auto refresh ทุก 5 วินาที</div>
                </div>
                <table>
                  <thead>
                    <tr>
                      <th style="width: 18%;">ID</th>
                      <th style="width: 24%;">ชื่อ</th>
                      <th style="width: 22%;">Server</th>
                      <th style="width: 12%;">ผู้เล่น</th>
                      <th style="width: 14%;">Modpack</th>
                      <th style="width: 10%;">สถานะ</th>
                    </tr>
                  </thead>
                  <tbody id="instancesTbody"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section id="viewAnnouncements" style="display:none;">
            <div class="grid">
              <div class="tableWrap">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:2px 2px 10px;">
                  <div style="font-weight:750; letter-spacing:0.3px;">ประกาศ / Maintenance</div>
                  <div style="color:var(--muted); font-size:12px;">บันทึกลง Supabase ตาราง starhub_settings</div>
                </div>
                <div class="adminTop">
                  <button id="discordLoginBtn" class="miniBtn">เข้าสู่ระบบ Discord</button>
                  <button id="discordLogoutBtn" class="miniBtn danger" style="display:none;">ออกจากระบบ</button>
                  <button id="adminSaveBtn" class="miniBtn">บันทึก</button>
                  <span class="adminStatus" id="adminStatus"></span>
                </div>

                <div class="adminRow">
                  <div>
                    <label for="adminMaintenance">Maintenance</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                      <input id="adminMaintenance" type="checkbox" style="width:auto;" />
                      <div style="color:var(--muted); font-size:12px;">เปิด = ปิดปรับปรุง</div>
                    </div>
                    <label for="adminMaintenanceMessage">ข้อความ Maintenance</label>
                    <textarea id="adminMaintenanceMessage" placeholder="ข้อความที่จะแสดงเมื่อปิดปรับปรุง"></textarea>
                    <label for="adminMinClose">Announcement Min Close (วินาที)</label>
                    <input id="adminMinClose" type="number" min="0" max="120" step="1" />
                  </div>

                  <div>
                    <div class="annTitleRow">
                      <div style="color:var(--muted); font-size:12px;">Announcements</div>
                      <div class="annActions">
                        <button id="adminAddAnnouncementBtn" class="miniBtn">เพิ่มประกาศ</button>
                      </div>
                    </div>
                    <div id="announcementsEditor"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script>
      const $ = (id) => document.getElementById(id)
      const fmtTime = (ms) => {
        try {
          const d = new Date(ms)
          return d.toLocaleString('th-TH')
        } catch (e) {
          return '-'
        }
      }

      const render = (data) => {
        const maintenance = !!data?.maintenance
        const serverOnline = data?.serverOnline === true
        const serverIp = typeof data?.serverIp === 'string' ? data.serverIp : ''
        const serverPlayers = (typeof data?.server?.playersOnline === 'number' && typeof data?.server?.playersMax === 'number')
          ? `${data.server.playersOnline}/${data.server.playersMax}`
          : ''
        const onlineUsers = typeof data?.onlineUsers === 'number' ? data.onlineUsers : null
        const updatedAt = typeof data?.updatedAt === 'number' ? data.updatedAt : null

        $('updatedAt').textContent = updatedAt ? fmtTime(updatedAt) : '-'

        if (maintenance) {
          $('dot').style.background = 'var(--bad)'
          $('headline').textContent = 'ปิดปรับปรุง'
        } else {
          $('dot').style.background = 'var(--good)'
          $('headline').textContent = 'เปิดให้บริการ'
        }

        $('serverStatus').textContent = maintenance ? 'ปิดปรับปรุง' : 'ปกติ'
        $('maintenanceMessage').textContent = maintenance ? (data?.maintenanceMessage || '') : 'ระบบพร้อมใช้งาน'

        $('apiStatus').textContent = 'OK'
        $('apiDesc').textContent = 'GET /api/status'

        $('onlineUsers').textContent = onlineUsers === null ? '-' : String(onlineUsers)
        $('onlineDesc').textContent = onlineUsers === null
          ? 'ยังไม่ได้ตั้งค่า (Upstash หรือ Supabase) จึงนับผู้ใช้ออนไลน์ไม่ได้'
          : 'นับจาก heartbeat ในช่วง 5 นาทีล่าสุด'

        if (data?.instancesOk === false && data?.instancesError) {
          $('apiStatus').textContent = 'Warning'
          $('apiDesc').textContent = `instances error: ${String(data.instancesError)}`
        }

        const insts = Array.isArray(data?.instances) ? data.instances : []
        const sorted = [...insts].sort((a, b) => {
          const aMaint = a?.maintenance === true ? 1 : 0
          const bMaint = b?.maintenance === true ? 1 : 0
          if (aMaint !== bMaint) return aMaint - bMaint
          const aOn = a?.serverOnline === true ? 1 : 0
          const bOn = b?.serverOnline === true ? 1 : 0
          if (aOn !== bOn) return bOn - aOn
          return String(a?.name || '').localeCompare(String(b?.name || ''), 'th')
        })
        const tbody = $('instancesTbody')
        tbody.innerHTML = ''
        for (const inst of sorted) {
          const tr = document.createElement('tr')
          const ip = typeof inst?.serverIp === 'string' ? inst.serverIp : ''
          const online = inst?.serverOnline === true
          const players = (typeof inst?.server?.playersOnline === 'number' && typeof inst?.server?.playersMax === 'number')
            ? `${inst.server.playersOnline}/${inst.server.playersMax}`
            : '-'
          const statusTag = maintenance
            ? tagHtml('Maintenance', 'bad')
            : (inst?.maintenance === true ? tagHtml('Maintenance', 'bad') : (ip ? (online ? tagHtml('Online', 'good') : tagHtml('Offline', 'bad')) : tagHtml('No IP', 'warn')))
          tr.innerHTML = `
            <td>${escapeHtml(inst.id || '')}</td>
            <td>${escapeHtml(inst.name || '')}</td>
            <td>${ip ? escapeHtml(ip) : '-'}</td>
            <td>${escapeHtml(players)}</td>
            <td>${escapeHtml(inst.modpackVersion || inst.version || '')}</td>
            <td>${statusTag}</td>
          `
          tbody.appendChild(tr)
        }
      }

      const tagHtml = (text, kind) => {
        const cls = kind === 'bad' ? 'tag bad' : (kind === 'warn' ? 'tag warn' : 'tag good')
        return `<span class="${cls}"><span class="miniDot"></span>${escapeHtml(text)}</span>`
      }

      const escapeHtml = (s) => {
        return String(s)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;')
      }

      const load = async () => {
        const started = Date.now()
        try {
          const res = await fetch('/api/status', { cache: 'no-store' })
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const data = await res.json()
          render(data)
          $('apiStatus').textContent = 'OK'
          $('apiDesc').textContent = `GET /api/status (${Date.now() - started}ms)`
        } catch (e) {
          $('dot').style.background = 'var(--bad)'
          $('headline').textContent = 'API Error'
          $('apiStatus').textContent = 'Error'
          $('apiDesc').textContent = String(e && e.message ? e.message : e)
        }
      }

      $('refreshBtn').addEventListener('click', () => load())
      load()
      setInterval(load, 5000)

      let setView = (view) => {
        const isDash = view === 'dashboard'
        $('viewDashboard').style.display = isDash ? '' : 'none'
        $('viewAnnouncements').style.display = isDash ? 'none' : ''
        $('navDashboard').classList.toggle('active', isDash)
        $('navAnnouncements').classList.toggle('active', !isDash)
        const activeEl = isDash ? $('viewDashboard') : $('viewAnnouncements')
        try {
          activeEl.classList.remove('fadeIn')
          void activeEl.offsetWidth
          activeEl.classList.add('fadeIn')
        } catch (e) {}
        try {
          const raw = String(location.hash || '').replace('#', '')
          const qIdx = raw.indexOf('?')
          const suffix = qIdx >= 0 ? raw.slice(qIdx) : ''
          history.replaceState(null, '', `#${isDash ? 'dashboard' : 'announcements'}${suffix}`)
        } catch (e) {}
      }

      $('navDashboard').addEventListener('click', () => setView('dashboard'))
      $('navAnnouncements').addEventListener('click', () => setView('announcements'))
      const initialHash = String(location.hash || '').replace('#', '').split('?')[0].trim().toLowerCase()
      setView(initialHash === 'announcements' ? 'announcements' : 'dashboard')

      const admin = {
        loaded: false,
        announcements: [],
        announcementMinCloseSeconds: 5,
        maintenance: false,
        maintenanceMessage: ''
      }

      const setAdminStatus = (msg) => {
        $('adminStatus').textContent = msg || ''
      }

      const auth = { authenticated: false, userId: null }

      const setAdminEnabled = (enabled) => {
        $('adminSaveBtn').disabled = !enabled
        $('adminAddAnnouncementBtn').disabled = !enabled
        $('adminMaintenance').disabled = !enabled
        $('adminMaintenanceMessage').disabled = !enabled
        $('adminMinClose').disabled = !enabled
      }

      const refreshAuth = async () => {
        try {
          const res = await fetch('/api/auth/me', { cache: 'no-store', credentials: 'include' })
          const data = await res.json().catch(() => null)
          auth.authenticated = !!data?.authenticated
          auth.userId = auth.authenticated && typeof data?.userId === 'string' ? data.userId : null
        } catch {
          auth.authenticated = false
          auth.userId = null
        }

        $('discordLoginBtn').style.display = auth.authenticated ? 'none' : ''
        $('discordLogoutBtn').style.display = auth.authenticated ? '' : 'none'
        setAdminEnabled(auth.authenticated)
        setAdminStatus(auth.authenticated ? `ล็อกอินแล้ว: ${auth.userId || ''}` : 'ยังไม่ได้ล็อกอิน')
      }

      const adminFetch = async (path, { method = 'GET', body = null } = {}) => {
        const res = await fetch(path, {
          method,
          headers: {
            ...(body ? { 'Content-Type': 'application/json' } : {})
          },
          body: body ? JSON.stringify(body) : undefined,
          cache: 'no-store',
          credentials: 'include'
        })
        const text = await res.text().catch(() => '')
        let data = null
        try { data = text ? JSON.parse(text) : null } catch {}
        if (!res.ok) {
          const err = data && data.error ? data.error : `HTTP ${res.status}`
          throw new Error(err)
        }
        return data
      }

      const renderAnnouncementsEditor = () => {
        const box = $('announcementsEditor')
        box.innerHTML = ''

        const list = Array.isArray(admin.announcements) ? admin.announcements : []
        if (list.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'adminStatus'
          empty.textContent = 'ยังไม่มีประกาศ'
          box.appendChild(empty)
          return
        }

        list.forEach((a, idx) => {
          const item = document.createElement('div')
          item.className = 'annItem'
          item.dataset.idx = String(idx)

          const titleRow = document.createElement('div')
          titleRow.className = 'annTitleRow'

          const titleLeft = document.createElement('div')
          titleLeft.style.color = 'var(--muted)'
          titleLeft.style.fontSize = '12px'
          titleLeft.textContent = `#${idx + 1} (${a && a.id ? a.id : '-'})`

          const actions = document.createElement('div')
          actions.className = 'annActions'

          const upBtn = document.createElement('button')
          upBtn.className = 'miniBtn'
          upBtn.textContent = 'ขึ้น'
          upBtn.disabled = idx === 0
          upBtn.addEventListener('click', () => {
            const arr = [...admin.announcements]
            const t = arr[idx - 1]
            arr[idx - 1] = arr[idx]
            arr[idx] = t
            admin.announcements = arr
            renderAnnouncementsEditor()
          })

          const downBtn = document.createElement('button')
          downBtn.className = 'miniBtn'
          downBtn.textContent = 'ลง'
          downBtn.disabled = idx === list.length - 1
          downBtn.addEventListener('click', () => {
            const arr = [...admin.announcements]
            const t = arr[idx + 1]
            arr[idx + 1] = arr[idx]
            arr[idx] = t
            admin.announcements = arr
            renderAnnouncementsEditor()
          })

          const delBtn = document.createElement('button')
          delBtn.className = 'miniBtn danger'
          delBtn.textContent = 'ลบ'
          delBtn.addEventListener('click', () => {
            const arr = [...admin.announcements]
            arr.splice(idx, 1)
            admin.announcements = arr
            renderAnnouncementsEditor()
          })

          actions.appendChild(upBtn)
          actions.appendChild(downBtn)
          actions.appendChild(delBtn)

          titleRow.appendChild(titleLeft)
          titleRow.appendChild(actions)
          item.appendChild(titleRow)

          const idLabel = document.createElement('label')
          idLabel.textContent = 'ID'
          const idInput = document.createElement('input')
          idInput.value = a && a.id ? String(a.id) : ''
          idInput.addEventListener('input', () => { a.id = idInput.value })

          const enLabel = document.createElement('label')
          enLabel.textContent = 'แสดงประกาศ'
          const enRow = document.createElement('div')
          enRow.style.display = 'flex'
          enRow.style.gap = '10px'
          enRow.style.alignItems = 'center'
          const enInput = document.createElement('input')
          enInput.type = 'checkbox'
          enInput.style.width = 'auto'
          enInput.checked = a && a.enabled === false ? false : true
          enInput.addEventListener('change', () => { a.enabled = enInput.checked })
          const enHint = document.createElement('div')
          enHint.style.color = 'var(--muted)'
          enHint.style.fontSize = '12px'
          enHint.textContent = 'ปิด = ไม่แสดงใน Launcher'
          enRow.appendChild(enInput)
          enRow.appendChild(enHint)

          const tLabel = document.createElement('label')
          tLabel.textContent = 'หัวข้อ'
          const tInput = document.createElement('input')
          tInput.value = a && a.title ? String(a.title) : ''
          tInput.addEventListener('input', () => { a.title = tInput.value })

          const imgLabel = document.createElement('label')
          imgLabel.textContent = 'รูป (Image URL)'
          const imgInput = document.createElement('input')
          imgInput.placeholder = 'https://...'
          imgInput.value = a && a.imageUrl ? String(a.imageUrl) : ''
          const imgPreview = document.createElement('div')
          imgPreview.style.marginTop = '10px'
          imgPreview.style.border = '1px solid rgba(255,215,0,0.14)'
          imgPreview.style.borderRadius = '14px'
          imgPreview.style.overflow = 'hidden'
          imgPreview.style.display = 'none'
          const imgEl = document.createElement('img')
          imgEl.alt = ''
          imgEl.style.width = '100%'
          imgEl.style.display = 'block'
          imgEl.addEventListener('error', () => { imgPreview.style.display = 'none' })
          imgPreview.appendChild(imgEl)
          const applyImg = () => {
            const v = String(imgInput.value || '').trim()
            a.imageUrl = v
            if (!v) { imgPreview.style.display = 'none'; return }
            imgEl.src = v
            imgPreview.style.display = ''
          }
          imgInput.addEventListener('input', applyImg)
          setTimeout(applyImg, 0)

          const mLabel = document.createElement('label')
          mLabel.textContent = 'คำอธิบาย'
          const mInput = document.createElement('textarea')
          mInput.value = a && a.message ? String(a.message) : ''
          mInput.addEventListener('input', () => { a.message = mInput.value })

          const fLabel = document.createElement('label')
          fLabel.textContent = 'ข้อความข้างล่าง'
          const fInput = document.createElement('textarea')
          fInput.style.minHeight = '70px'
          fInput.value = a && a.footer ? String(a.footer) : ''
          fInput.addEventListener('input', () => { a.footer = fInput.value })

          item.appendChild(idLabel)
          item.appendChild(idInput)
          item.appendChild(enLabel)
          item.appendChild(enRow)
          item.appendChild(tLabel)
          item.appendChild(tInput)
          item.appendChild(imgLabel)
          item.appendChild(imgInput)
          item.appendChild(imgPreview)
          item.appendChild(mLabel)
          item.appendChild(mInput)
          item.appendChild(fLabel)
          item.appendChild(fInput)

          box.appendChild(item)
        })
      }

      const loadAdmin = async () => {
        setAdminStatus('กำลังโหลด...')
        try {
          const data = await adminFetch('/api/admin-settings')
          const s = data && data.settings ? data.settings : null
          admin.maintenance = !!(s && s.maintenance)
          admin.maintenanceMessage = s && typeof s.maintenanceMessage === 'string' ? s.maintenanceMessage : ''
          admin.announcements = Array.isArray(s && s.announcements) ? s.announcements.map(x => ({ ...x })) : []
          admin.announcementMinCloseSeconds = typeof s?.announcementMinCloseSeconds === 'number' ? s.announcementMinCloseSeconds : 5
          admin.loaded = true

          $('adminMaintenance').checked = admin.maintenance
          $('adminMaintenanceMessage').value = admin.maintenanceMessage
          $('adminMinClose').value = String(admin.announcementMinCloseSeconds || 0)
          renderAnnouncementsEditor()
          setAdminStatus('โหลดแล้ว')
        } catch (e) {
          setAdminStatus(String(e && e.message ? e.message : e))
        }
      }

      const saveAdmin = async () => {
        if (!admin.loaded) {
          await loadAdmin()
          if (!admin.loaded) return
        }
        setAdminStatus('กำลังบันทึก...')
        try {
          admin.maintenance = $('adminMaintenance').checked === true
          admin.maintenanceMessage = String($('adminMaintenanceMessage').value || '')
          admin.announcementMinCloseSeconds = Math.max(0, Math.min(120, Math.floor(Number($('adminMinClose').value || 0))))

          const payload = {
            maintenance: admin.maintenance,
            maintenanceMessage: admin.maintenanceMessage,
            announcementMinCloseSeconds: admin.announcementMinCloseSeconds,
            announcements: admin.announcements
          }
          const data = await adminFetch('/api/admin-settings', { method: 'PUT', body: payload })
          const s = data && data.settings ? data.settings : null
          admin.maintenance = !!(s && s.maintenance)
          admin.maintenanceMessage = s && typeof s.maintenanceMessage === 'string' ? s.maintenanceMessage : ''
          admin.announcements = Array.isArray(s && s.announcements) ? s.announcements.map(x => ({ ...x })) : []
          admin.announcementMinCloseSeconds = typeof s?.announcementMinCloseSeconds === 'number' ? s.announcementMinCloseSeconds : admin.announcementMinCloseSeconds

          $('adminMaintenance').checked = admin.maintenance
          $('adminMaintenanceMessage').value = admin.maintenanceMessage
          $('adminMinClose').value = String(admin.announcementMinCloseSeconds || 0)
          renderAnnouncementsEditor()
          setAdminStatus('บันทึกแล้ว')
        } catch (e) {
          setAdminStatus(String(e && e.message ? e.message : e))
        }
      }

      $('adminSaveBtn').addEventListener('click', () => saveAdmin())
      $('adminAddAnnouncementBtn').addEventListener('click', () => {
        const id = `announcement_${Date.now()}`
        admin.announcements = [...(Array.isArray(admin.announcements) ? admin.announcements : []), { id, enabled: true, title: '', imageUrl: '', message: '', footer: '' }]
        admin.loaded = true
        renderAnnouncementsEditor()
      })

      $('discordLoginBtn').addEventListener('click', () => {
        const { route } = parseHashParams()
        const next = route === 'announcements' ? 'announcements' : 'dashboard'
        location.href = `/api/auth/discord/start?next=${encodeURIComponent(next)}`
      })
      $('discordLogoutBtn').addEventListener('click', async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST', cache: 'no-store', credentials: 'include', headers: { Accept: 'application/json' } })
        } catch {}
        await refreshAuth()
      })

      const parseHashParams = () => {
        const raw = String(location.hash || '').replace('#', '')
        const qIdx = raw.indexOf('?')
        if (qIdx < 0) return { route: raw.trim().toLowerCase(), params: new URLSearchParams('') }
        const route = raw.slice(0, qIdx).trim().toLowerCase()
        const params = new URLSearchParams(raw.slice(qIdx + 1))
        return { route, params }
      }

      const initRoute = () => {
        const { route } = parseHashParams()
        setView(route === 'announcements' ? 'announcements' : 'dashboard')
      }

      const maybeShowAuthMessage = () => {
        const { params } = parseHashParams()
        const authParam = params.get('auth')
        if (authParam === 'denied') setAdminStatus('บัญชีนี้ไม่มีสิทธิ์แก้ประกาศ')
        if (authParam === 'error') {
          const msg = params.get('msg') || 'login error'
          setAdminStatus(msg)
        }
        if (authParam === 'ok') setAdminStatus('ล็อกอินสำเร็จ')
      }

      const _oldSetView = setView
      const setViewWithAuth = (view) => {
        _oldSetView(view)
        if (view === 'announcements') {
          refreshAuth().then(async () => {
            maybeShowAuthMessage()
            if (auth.authenticated) await loadAdmin()
          })
        }
      }
      setView = setViewWithAuth

      initRoute()
      window.addEventListener('hashchange', () => initRoute())

      const boot = async () => {
        const { route, params } = parseHashParams()
        const authParam = params.get('auth')
        maybeShowAuthMessage()
        await refreshAuth()
        if (auth.authenticated) return
        if (authParam === 'denied' || authParam === 'error') return
        const next = route === 'announcements' ? 'announcements' : 'dashboard'
        location.href = `/api/auth/discord/start?next=${encodeURIComponent(next)}`
      }

      boot()
    </script>
  </body>
</html>
